<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarek</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ====== WHATSAPP STATUS STYLE ====== */
.stories{
  display:flex;
  gap:14px;
  padding:16px;
  overflow-x:auto;
}

.story{
  min-width:120px;
  height:120px;   /* دائري */
  border-radius:50%;
  overflow:hidden;
  background:#111;
  border:4px solid #2b7cff;
  position:relative;
  flex-shrink:0;
}

.story iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:50%;
  object-fit:cover;
}

/* توهج خارجي للحالة */
.story::before{
  content:"";
  position:absolute;
  top:-4px;
  left:-4px;
  width:calc(100% + 8px);
  height:calc(100% + 8px);
  border-radius:50%;
  border:2px solid #00f0ff;
  animation: glowBorder 2s linear infinite alternate;
}

@keyframes glowBorder{
  0%{border-color:#2b7cff;}
  100%{border-color:#00f0ff;}
}

/* ====== PROFILE ====== */
.profile{
  text-align:center;
  margin-top:10px;
}

.profile-img{
  width:150px;
  height:150px;
  margin:20px auto;
  border-radius:50%;
  padding:5px;
  background:linear-gradient(45deg,#2b7cff,#00f0ff);
  animation: float 3s ease-in-out infinite;
  position:relative;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.profile-img img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

.online{
  width:16px;
  height:16px;
  background:#1aff00;
  border:3px solid #000;
  border-radius:50%;
  position:absolute;
  bottom:12px;
  right:12px;
}

h2{
  margin-top:10px;
  font-size:26px;
  letter-spacing:4px;
  color:#6fb3ff;
  text-shadow:0 0 10px #2b7cff;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #2b7cff; }
  to{ text-shadow:0 0 25px #00f0ff; }
}

.buttons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:25px 0;
  flex-wrap:wrap;
}

.buttons a{
  padding:10px 22px;
  border-radius:25px;
  background:#111;
  color:#fff;
  text-decoration:none;
  border:1px solid #1f3b5f;
  transition:.3s;
}

.buttons a:hover{
  background:#2b7cff;
}
</style>
</head>

<body>

<div class="stories">
  <div class="story"><iframe src="https://www.youtube.com/embed/VIDEO_ID1"></iframe></div>
  <div class="story"><iframe src="https://www.youtube.com/embed/VIDEO_ID2"></iframe></div>
  <div class="story"><iframe src="https://www.youtube.com/embed/VIDEO_ID3"></iframe></div>
  <div class="story"><iframe src="https://www.youtube.com/embed/VIDEO_ID4"></iframe></div>
  <div class="story"><iframe src="https://www.youtube.com/embed/VIDEO_ID5"></iframe></div>
</div>

<div class="profile">

  <div class="profile-img">
    <img src="https://img.alfrsantv.com/img/f177224568527491.jpg">
    <span class="online"></span>
  </div>

  <h2>Tarek</h2>

  <div class="buttons">
    <a href="#">Facebook</a>
    <a href="#">GitHub</a>
    <a href="#">Forum</a>
  </div>

</div>

</body>
</html>

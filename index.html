<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile UI</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

html, body{
  width:100%;
  height:100%;
}

body{
  background: radial-gradient(circle at top left, #0b1c2d, #000);
  color:#fff;
  overflow-x:hidden;
}

/* =================== VIDEOS =================== */
.videos{
  display:flex;
  gap:15px;
  padding:20px;
  overflow-x:auto;
}

.videos iframe{
  min-width:260px;
  height:150px;
  border-radius:14px;
  border:2px solid #1f3b5f;
}

/* =================== WRAPPER =================== */
.wrapper{
  text-align:center;
  margin-top:30px;
}

/* =================== STORIES =================== */
.stories{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:50px;
}

.story{
  width:70px;
  height:120px;
  border-radius:14px;
  background:linear-gradient(180deg,#2b7cff,#0a1a2f);
  position:relative;
}

.story::after{
  content:'';
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid #2b7cff;
  position:absolute;
  top:8px;
  left:8px;
}

/* =================== PROFILE IMAGE =================== */
.profile-img{
  width:160px;
  height:160px;
  margin:0 auto;
  border-radius:50%;
  padding:5px;
  background:linear-gradient(45deg,#2b7cff,#00f0ff);
  position:relative;
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-12px); }
  100%{ transform:translateY(0); }
}

.profile-img img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

/* online */
.online{
  width:18px;
  height:18px;
  background:#22ff00;
  border:3px solid #000;
  border-radius:50%;
  position:absolute;
  bottom:14px;
  right:14px;
}

/* =================== NAME EFFECT =================== */
h2{
  margin:25px 0;
  font-size:28px;
  letter-spacing:5px;
  color:#6fb3ff;
  text-shadow:
    0 0 10px #2b7cff,
    0 0 20px #2b7cff;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
  from{
    text-shadow:0 0 10px #2b7cff;
  }
  to{
    text-shadow:0 0 25px #00f0ff;
  }
}

/* =================== BUTTONS =================== */
.buttons{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:40px;
}

.buttons a{
  padding:12px 22px;
  border-radius:30px;
  background:#0b1c2d;
  color:#fff;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:8px;
  border:1px solid #1f3b5f;
  transition:.3s;
}

.buttons a:hover{
  background:#2b7cff;
}
</style>
</head>

<body>

<!-- =================== YOUTUBE VIDEOS =================== -->
<div class="videos">
  <iframe src="https://www.youtube.com/embed/VIDEO_ID1" allowfullscreen></iframe>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID2" allowfullscreen></iframe>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID3" allowfullscreen></iframe>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID4" allowfullscreen></iframe>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID5" allowfullscreen></iframe>
</div>

<div class="wrapper">

  <!-- STORIES -->
  <div class="stories">
    <div class="story"></div>
    <div class="story"></div>
    <div class="story"></div>
    <div class="story"></div>
    <div class="story"></div>
  </div>

  <!-- PROFILE -->
  <div class="profile-img">
    <img src="https://i.imgur.com/8Km9tLL.jpg">
    <span class="online"></span>
  </div>

  <h2>AHMED</h2>

  <!-- BUTTONS -->
  <div class="buttons">
    <a href="#"><i class="fab fa-facebook-f"></i> Facebook</a>
    <a href="#"><i class="fab fa-github"></i> GitHub</a>
    <a href="#"><i class="fas fa-comments"></i> Forum</a>
  </div>

</div>

</body>
</html>

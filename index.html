<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile UI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

html,body{
  width:100%;
  height:100%;
}

body{
  background: radial-gradient(circle at top left,#0b1c2d,#000);
  color:#fff;
  overflow-x:hidden;
}

/* ====== TOP VIDEOS (INSTEAD OF STORIES) ====== */
.stories{
  display:flex;
  gap:15px;
  padding:20px;
  overflow-x:auto;
  justify-content:flex-start;
}

.stories iframe{
  min-width:240px;
  height:135px;
  border-radius:14px;
  border:2px solid #1f3b5f;
}

/* ====== PROFILE WRAPPER ====== */
.wrapper{
  text-align:center;
  margin-top:20px;
}

/* ====== PROFILE IMAGE FLOAT ====== */
.profile-img{
  width:160px;
  height:160px;
  margin:0 auto;
  border-radius:50%;
  padding:5px;
  background:linear-gradient(45deg,#2b7cff,#00f0ff);
  position:relative;
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
  100%{transform:translateY(0);}
}

.profile-img img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

.online{
  width:18px;
  height:18px;
  background:#22ff00;
  border:3px solid #000;
  border-radius:50%;
  position:absolute;
  bottom:14px;
  right:14px;
}

/* ====== NAME EFFECT ====== */
h2{
  margin:22px 0;
  letter-spacing:4px;
  font-size:28px;
  color:#6fb3ff;
  text-shadow:0 0 12px #2b7cff;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #2b7cff; }
  to{ text-shadow:0 0 25px #00f0ff; }
}

/* ====== BUTTONS ====== */
.buttons{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:40px;
}

.buttons a{
  padding:12px 22px;
  border-radius:30px;
  background:#0b1c2d;
  color:#fff;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:8px;
  border:1px solid #1f3b5f;
  transition:.3s;
}

.buttons a:hover{
  background:#2b7cff;
}
</style>
</head>

<body>

<!-- ====== TOP VIDEOS (REPLACES STORIES) ====== -->
<div class="stories">
  <iframe src="https://www.youtube.com/embed/VIDEO_ID1" allowfullscreen></iframe>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID2" allowfullscreen></iframe>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID3" allowfullscreen></iframe>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID4" allowfullscreen></iframe>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID5" allowfullscreen></iframe>
</div>

<div class="wrapper">

  <div class="profile-img">
    <img src="https://i.imgur.com/8Km9tLL.jpg">
    <span class="online"></span>
  </div>

  <h2>AHMED</h2>

  <div class="buttons">
    <a href="#"><i class="fab fa-facebook-f"></i> Facebook</a>
    <a href="#"><i class="fab fa-github"></i> GitHub</a>
    <a href="#"><i class="fas fa-comments"></i> Forum</a>
  </div>

</div>

</body>
</html>

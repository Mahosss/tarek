<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarek</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(43,124,255,0.5);
  animation: floatCircle linear infinite;
}

@keyframes floatCircle{
  0%{ transform:translateY(0) translateX(0) scale(1);}
  50%{ transform:translateY(-150px) translateX(50px) scale(0.8);}
  100%{ transform:translateY(0) translateX(0) scale(1);}
}

.profile{
  text-align:center;
  z-index:2;
  position:relative;
}

.profile-img{
  width:150px;
  height:150px;
  margin:0 auto 20px;
  border-radius:50%;
  padding:5px;
  background:linear-gradient(45deg,#2b7cff,#00f0ff);
  animation: float 3s ease-in-out infinite;
  position:relative;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.profile-img img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

.online{
  width:16px;
  height:16px;
  background:#1aff00;
  border:3px solid #000;
  border-radius:50%;
  position:absolute;
  bottom:12px;
  right:12px;
}

h2{
  margin-top:10px;
  font-size:26px;
  letter-spacing:3px;
  color:#6fb3ff;
  text-shadow:0 0 5px #2b7cff;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #2b7cff; }
  to{ text-shadow:0 0 15px #00f0ff; }
}
</style>
</head>

<body>

<script>
const numCircles = 20;
for(let i=0;i<numCircles;i++){
  const circle = document.createElement('div');
  circle.classList.add('circle');
  const size = Math.random()*15 + 5; 
  circle.style.width = size+'px';
  circle.style.height = size+'px';
  circle.style.left = Math.random()*100 + 'vw';
  circle.style.bottom = Math.random()*100 + 'vh';
  circle.style.animationDuration = (Math.random()*5 + 5)+'s';
  circle.style.background = `rgba(43,124,255,${Math.random()*0.5 +0.2})`;
  document.body.appendChild(circle);
}
</script>

<div class="profile">
  <div class="profile-img">
    <img src="https://img.alfrsantv.com/img/f177224568527491.jpg" alt="Profile">
    <span class="online"></span>
  </div>
  <h2>Tarek</h2>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarek</title>
<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
  user-select:none;
}

body{
  background:#000;
  color:#fff;
  overflow:hidden;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(43,124,255,0.3);
  z-index:1;
  animation: floatCircle linear infinite;
}

@keyframes floatCircle{
  0%{ transform:translateY(0) translateX(0) scale(1);}
  50%{ transform:translateY(-100px) translateX(50px) scale(0.8);}
  100%{ transform:translateY(0) translateX(0) scale(1);}
}

.profile{
  text-align:center;
  z-index:2;
  position:relative;
}

.profile-img{
  width:150px;
  height:150px;
  margin:0 auto 20px;
  border-radius:50%;
  padding:5px;
  background:linear-gradient(45deg,#2b7cff,#00f0ff);
  position:relative;
  cursor:pointer;
  transition: box-shadow 0.3s ease;
  animation: float 3s ease-in-out infinite;
  overflow:hidden;
}

.profile-img img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  pointer-events:none;
  transition: transform 0.3s ease;
}

.profile-img:hover img{
  transform: scale(1.15);
}
.profile-img:hover{
  box-shadow: 0 0 20px 5px rgba(43,124,255,0.7);
}

.online{
  width:16px;
  height:16px;
  background:#1aff00;
  border:3px solid #000;
  border-radius:50%;
  position:absolute;
  bottom:12px;
  right:12px;
}

h2{
  margin-top:10px;
  font-size:26px;
  letter-spacing:3px;
  color:#6fb3ff;
  text-shadow:0 0 5px #2b7cff;
  overflow:hidden;
  white-space:nowrap;
  border-right: 2px solid #6fb3ff;
  width:0;
  animation: typing 2s steps(10) forwards;
}

@keyframes typing{
  from{ width:0; }
  to{ width:8ch; }
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

#modal{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.3s ease;
  z-index:10;
}

#modal-content{
  border:5px solid #2b7cff;
  border-radius:20px;
  overflow:hidden;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:5px;
  transform: scale(0.8);
  transition: transform 0.3s ease;
  max-width:90%;
}

#modal.show{
  opacity:1;
  pointer-events:auto;
}

#modal.show #modal-content{
  transform: scale(1);
}

#modal img{
  width:100%;
  height:auto;
  display:block;
  border-radius:15px;
  object-fit:cover;
}
</style>
</head>
<body>

<!-- ====== CIRCLES ====== -->
<div id="circles-container"></div>

<div class="profile">
  <div class="profile-img" id="profilePic">
    <img src="https://img.alfrsantv.com/img/f177224568527491.jpg" alt="Profile">
    <span class="online"></span>
  </div>
  <h2>Tarek</h2>
</div>

<!-- ====== MODAL ====== -->
<div id="modal">
  <div id="modal-content">
    <img src="" alt="Profile Large">
  </div>
</div>

<script>
// الكور خلف الصورة فقط
const numCircles = 15;
const circlesContainer = document.getElementById('circles-container');
for(let i=0;i<numCircles;i++){
  const circle = document.createElement('div');
  circle.classList.add('circle');
  const size = Math.random()*15 + 5; 
  circle.style.width = size+'px';
  circle.style.height = size+'px';
  circle.style.left = `calc(50% + ${Math.random()*200 - 100}px)`;
  circle.style.top = `calc(50% + ${Math.random()*200 - 100}px)`;
  circle.style.animationDuration = (Math.random()*5 + 5)+'s';
  circle.style.background = `rgba(43,124,255,${Math.random()*0.5 +0.2})`;
  circlesContainer.appendChild(circle);
}

// تكبير الصورة عند الضغط
const profilePic = document.getElementById('profilePic');
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modal-content');
const modalImg = modal.querySelector('img');

profilePic.addEventListener('click',()=>{
  modalImg.src = profilePic.querySelector('img').src;
  modal.classList.add('show');
});

modal.addEventListener('click',()=>{
  modal.classList.remove('show');
});
</script>

</body>
</html>
